<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .user-card { transition: transform 0.2s; }
        .user-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-light">

    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-5 fw-bold text-dark">Live Attendance Dashboard</h1>
            <p class="text-secondary">Pico 2W + PC Web Service Monitor</p>
            
            <button class="btn btn-success shadow-sm mt-2" data-bs-toggle="modal" data-bs-target="#addUserModal">
                + Add New User
            </button>
        </header>

        <div id="attendance-display" style="max-width: 700px; margin: 0 auto;">
            <div class="text-center">
                <div class="spinner-border text-primary" role="status"></div>
                <p>Connecting to backend...</p>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addUserModal" tabindex="-1" aria-labelledby="addUserModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content shadow-lg">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="addUserModalLabel">Register New User</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="addUserForm">
                        <div class="mb-4">
                            <label class="form-label fw-bold">Step 1: Scan RFID Card</label>
                            <div class="input-group">
                                <input type="text" id="reg-uid" class="form-control bg-light" placeholder="Card UID will appear here" readonly required>
                                <button class="btn btn-primary" type="button" id="btn-scan">Start Scan</button>
                            </div>
                            <div id="scan-status" class="form-text mt-2">
                                Click 'Start Scan' then tap card on Pico reader.
                            </div>
                        </div>

                        <hr>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Step 2: User Details</label>
                            <input type="text" id="reg-first-name" class="form-control mb-2" placeholder="First Name" required>
                            <input type="text" id="reg-last-name" class="form-control" placeholder="Last Name" required>
                        </div>

                        <div class="modal-footer px-0 pb-0">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-success" id="btn-submit-user" disabled>Save User</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
